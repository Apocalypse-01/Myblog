spring.application.name=myblog-server

server.port=8081


spring.datasource.url=jdbc:mysql://localhost:3306/myblog?characterEncoding=utf-8&useSSL=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=my_blog
spring.datasource.password=123456


# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.mapUnderscoreToCamelCase=true

# File Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Knife4j / Springdoc OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
knife4j.enable=true

# AI 大模型配置 (兼容 OpenAI 接口格式)
# 替换为你的 API Key 即可使用
ai.api.url=https://api.deepseek.com/v1/chat/completions
