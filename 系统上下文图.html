<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>系统上下文图 - System Context Diagram</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #fff; font-family: "Microsoft YaHei", sans-serif;
  }
  .diagram { width: 960px; padding: 30px 0; }
  h2 { text-align: center; font-size: 22px; color: #333; margin-bottom: 8px; font-weight: 700; }
  .subtitle { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 28px; }
  .scene { position: relative; width: 100%; height: 520px; }
  /* 中心系统 */
  .system-core {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 240px; height: 100px; border-radius: 16px;
    background: #3a3f47; border: 3px solid #555;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    z-index: 10;
  }
  .system-core .name { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .system-core .desc { font-size: 11px; color: #ccc; margin-top: 4px; }
  /* 外部实体 */
  .entity {
    position: absolute; text-align: center;
  }
  .entity-box {
    width: 130px; padding: 16px 12px; border-radius: 12px;
    background: #f8f9fa; border: 2px solid #ddd;
    font-size: 13px; color: #444;
  }
  .entity-box .icon { font-size: 24px; margin-bottom: 4px; }
  .entity-box .label { font-weight: 700; color: #3a3f47; }
  .entity-box .note { font-size: 10px; color: #999; margin-top: 3px; }
  /* 位置 */
  .visitor   { top: 10px;  left: 50px; }
  .author    { top: 10px;  right: 50px; }
  .ai-api    { bottom: 10px; right: 50px; }
  .browser   { top: 160px; left: 0; }
  /* 连线标签 */
  .conn-label {
    position: absolute; font-size: 10px; color: #888;
    background: #fff; padding: 1px 6px;
  }
  /* SVG 连线 */
  .lines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  /* 图例 */
  .legend { display: flex; justify-content: center; gap: 30px; margin-top: 20px; font-size: 11px; color: #888; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-person { background: #e8f0fe; border: 2px solid #90b8f8; }
  .dot-external { background: #fef3e0; border: 2px solid #f0c878; }
  .dot-system { background: #3a3f47; border: 2px solid #555; }
</style>
</head>
<body>
<div class="diagram">
  <h2>系统上下文图</h2>
  <div class="subtitle">System Context Diagram — 展示系统与外部实体间的交互关系</div>
  <div class="scene">
    <!-- 中心系统 -->
    <div class="system-core">
      <div class="name">智能笔记系统</div>
      <div class="desc">个人知识管理平台</div>
    </div>

    <!-- 外部实体 -->
    <div class="entity visitor"><div class="entity-box">
      <div class="icon">👤</div>
      <div class="label">游客用户</div>
      <div class="note">浏览文章<br>阅读内容<br>查看评论</div>
    </div></div>

    <div class="entity author"><div class="entity-box">
      <div class="icon">✍️</div>
      <div class="label">注册用户</div>
      <div class="note">创作文章<br>AI 辅助写作<br>互动 &amp; 分析</div>
    </div></div>

    <div class="entity ai-api"><div class="entity-box">
      <div class="icon">🤖</div>
      <div class="label">大语言模型 API</div>
      <div class="note">续写 · 总结<br>标题优化 · 纠错</div>
    </div></div>

    <div class="entity browser"><div class="entity-box">
      <div class="icon">🌐</div>
      <div class="label">浏览器</div>
      <div class="note">Vue3 SPA 应用<br>localStorage 草稿</div>
    </div></div>

    <!-- SVG 连线 -->
    <svg class="lines" viewBox="0 0 960 520">
      <defs>
        <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#888"/>
        </marker>
        <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5a8ec0"/>
        </marker>
      </defs>
      <!-- visitor → system (右上到中心) -->
      <line x1="380" y1="100" x2="420" y2="240" stroke="#aaa" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="8,4"/>
      <!-- author → system -->
      <line x1="580" y1="100" x2="540" y2="240" stroke="#aaa" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="8,4"/>
      <!-- ai-api ← system (双向) -->
      <line x1="530" y1="300" x2="650" y2="430" stroke="#e8c060" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="8,4"/>
      <line x1="640" y1="425" x2="525" y2="310" stroke="#e8c060" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="8,4"/>
      <!-- browser → system -->
      <line x1="120" y1="210" x2="340" y2="240" stroke="#aaa" stroke-width="1.8" marker-end="url(#arr)" stroke-dasharray="8,4"/>

      <!-- 文字标签 -->
      <text x="360" y="165" font-size="10" fill="#999" text-anchor="middle">浏览请求</text>
      <text x="560" y="165" font-size="10" fill="#999" text-anchor="middle">创作/互动</text>
      <text x="170" y="200" font-size="10" fill="#999" text-anchor="middle">HTTP 请求</text>
      <text x="580" y="380" font-size="10" fill="#c0a040" text-anchor="middle">AI 调用 / 返回</text>
    </svg>
  </div>
  <div class="legend">
    <span><div class="dot dot-person"></div> 用户角色</span>
    <span><div class="dot dot-external"></div> 外部系统</span>
    <span><div class="dot dot-system"></div> 本系统</span>
  </div>
</div>
</body>
</html>
